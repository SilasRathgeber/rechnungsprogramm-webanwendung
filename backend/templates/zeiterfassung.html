<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rechnungsprogramm Zeiterfassung</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        tr.selected {
        background-color: #d0e7ff; /* Hervorhebung */
        }
        tr:hover {
        cursor: pointer;
        background-color: #e8f0fe;
        }
    </style>
    </head>
    <body>
    <h1>Rechnungsprogramm Zeiterfassung</h1>
    <form method="POST" action="/zeiterfassung" id="kundeFilterForm">
        <input type="hidden" name="aktion" value="filtern">       
        <select name="kunde_ausw_id" required onchange="if(this.value) this.form.submit();">
            <option value="" disabled {% if not kunde_ausw_id %}selected{% endif %}>
                Bitte Kunden wählen...
            </option>
            {% for kunde in kunden %}
                <option value="{{ kunde[0] }}" {% if kunde_ausw_id == kunde[0]|string %}selected{% endif %}>
                    {{ kunde[1] }} (ID: {{ kunde[0] }})
                </option>
                </option>
            {% endfor %}
        </select>
    </form>
    <br>
    <form id="newZeitForm" method="POST" action="/zeiterfassung">
        <input type="date" id="startDate" name="StartDatum" required>
        <input type="date" id="endDate" name="EndDatum" required>
        <input type="hidden" name="kunde_ausw_id" value="{{ kunde_ausw_id }}">
        <button type="submit" name="aktion" value="neuErfassung"  id="newErfassung">Neue Zeiterfassung erstellen</button>
    </form>
    <br>
    <form id="loescheZeitform" method="POST" action="/zeiterfassung">
        <input type="hidden" name="id" id="selectedIdInputLoesche" value="">
        <input type="hidden" name="kunde_ausw_id" value="{{ kunde_ausw_id }}">
        <button type="submit" name="aktion" value="löschErfassung"  id="löschErfassung">Zeiterfassung löschen</button>
    </form>
    <br>
    <form id="editForm" method="GET" action="/zeiterfassung/bearbeiten">
        <input type="hidden" name="id" id="selectedIdInput" value="">
        <button type="submit" id="editButton" disabled>Zeiterfassung bearbeiten</button>
    </form>
    <br>
    <a href="{{ url_for('kunden.kunden_seite') }}">
        <button>Zu den Kunden</button>
    </a>
    <hr>
    <table border="1" cellpadding="5" cellspacing="0" id="zeiterfassung-table">
        <thead>
        <tr>
            {% for col in columns %}
            <th>{{ col }}</th>
            {% endfor %}
        </tr>
        </thead>
        <tbody>
        {% for row in data %}
        <tr data-id="{{ row['id'] }}">
            {% for col in columns %}
            <td>{{ row[col] }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
        </tbody>
    </table>
    <br>
    
    <script>
        const table = document.getElementById('zeiterfassung-table');
        const editButton = document.getElementById('editButton');
        const selectedIdInput = document.getElementById('selectedIdInput');
        let selectedRow = null;

        const selectedIdInputs = [
            document.getElementById('selectedIdInput'),
            document.getElementById('selectedIdInputLoesche'),
            // weitere falls vorhanden
        ];

        table.querySelectorAll('tbody tr').forEach(row => {
            row.addEventListener('click', () => {
                if (selectedRow) selectedRow.classList.remove('selected');
                row.classList.add('selected');
                selectedRow = row;
                
                let zellen = row.querySelectorAll('td');
                let idAusZelle = zellen[0].textContent.trim(); // oder andere Spalte

                selectedIdInputs.forEach(input => {
                    if(input) input.value = idAusZelle;
                });

                editButton.disabled = false;
                // und andere Buttons ggf. auch aktivieren
            });
        });

        ['editForm', 'loescheZeitform'].forEach(formId => {
            const form = document.getElementById(formId);
            if (form) {
                form.addEventListener('submit', function(e) {
                    // Hidden input im gleichen Formular suchen:
                    const hiddenInput = form.querySelector('input[type="hidden"]');
                    if (!hiddenInput || !hiddenInput.value) {
                        e.preventDefault();
                        alert('Bitte zuerst eine Zeile auswählen!');
                    }
                });
            }
        });
        const lösch_button = document.getElementById('loescheZeitform')
        lösch_button.addEventListener('submit', function(e) {
            const wirklichLoeschen = confirm("Willst du das wirklich löschen?");
            if (!wirklichLoeschen){
                e.preventDefault();
            }
        })

        
        // Optional: Falls kein Eintrag ausgewählt ist, Button deaktivieren
        // (z.B. beim Laden oder nach Formular-Submit)
    </script>
</body>
</html>
