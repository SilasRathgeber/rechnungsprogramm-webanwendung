<!DOCTYPE html>
<html lang="de">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Meine Webseite</title>
  </head>
  <body>
    <h1>Gib einen neuen Kunden ein bitte:</h1>
    <form method="POST" action="/kunden">
      <input type="text" name="name" placeholder="Name" required>
      <input type="text" name="strasse" placeholder="Straße">
      <input type="text" name="hausnummer" placeholder="Hausnummer">
      <input type="text" name="plz" placeholder="PLZ">
      <input type="text" name="ort" placeholder="Ort">
      <input type="number" step="0.01" name="stundensatz" placeholder="Stundensatz">
      <button type="submit">Kunde speichern</button>
    </form>
    <form method="POST" action="/kunden">
      <select name="kunde_loeschen_id">
        <!-- Options mit Kunden-IDs zum Löschen -->
        {% for kunde in kunden %}
          <option value="{{ kunde[0] }}">{{ kunde[1] }} (ID: {{ kunde[0] }})</option>
        {% endfor %}
      </select>
      <button type="submit" name="aktion" value="loeschen">Kunde löschen</button>
    </form>
    <h2>Bestehende Kunden</h2>
    <ul>
      {% for kunde in kunden %}
        <li>{{ kunde[0] }} – {{ kunde[1] }} {{ kunde[2] }}, {{ kunde[3] }} {{ kunde[4] }}, {{ kunde[5] }} €/h</li>
      {% else %}
        <li>Keine Kunden gefunden.</li>
      {% endfor %}
    </ul>
  </body>
</html>
