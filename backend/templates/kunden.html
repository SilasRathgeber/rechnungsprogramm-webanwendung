{% extends "base.html" %}

{% block content %}
<body class="kunden">
  <header>
    <a href="{{ url_for('zeiterfassung.zeiterfassung_seite') }}">
        <button>Erfassungen ></button>
    </a>
    <h2>Kunden</h2>
  </header>
  <main>
    <form method="POST" action="/kunden">
      <input type="text" name="name" placeholder="Name" required>
      <input type="text" name="strasse" placeholder="Straße">
      <input type="text" name="hausnummer" placeholder="Hausnummer">
      <input type="text" name="plz" placeholder="PLZ">
      <input type="text" name="ort" placeholder="Ort">
      <input type="number" step="0.01" name="stundensatz" placeholder="Stundensatz">
      <button type="submit">Kunde Hinzufügen</button>
    </form>
    <br>
    <hr>
    <table cellpadding="5" cellspacing="0">
      <tbody>
        <thead>
          <tr>
            <th>Kundennummer</th>
            <th>Name</th>
            <th>Adresse</th>
            <th>Aktueller Satz</th>
          </tr>
        </thead>
        {% for kunde in kunden %}
        <tr>
            <td>{{ kunde[0] }}</td>
            <td>{{ kunde[1] }}</td>
            <td>{{ kunde[2] }} {{ kunde[3] }}, {{ kunde[4] }} {{ kunde[5] }}</td>
            <td>{{ kunde[6] }} €/h</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <hr>  
    <form method="POST" action="/kunden">
      <select name="kunde_loeschen_id">
        <!-- Options mit Kunden-IDs zum Löschen -->
        {% for kunde in kunden %}
          <option value="{{ kunde[0] }}">{{ kunde[1] }} (ID: {{ kunde[0] }})</option>
        {% endfor %}
      </select>
      <button type="submit" name="aktion" value="loeschen">Kunde löschen</button>
    </form>
  </main>
</body>
{% endblock %}
